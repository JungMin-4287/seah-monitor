  - "contract"
  - "supply"
  - "FID"
  - "restart"
  - "award"
  - "expansion"
  - "procurement"
  - "capacity"
  - "line pipe"
  - "OCTG"
  - "clad pipe"
  - "pipeline"
  - "CAPEX"
