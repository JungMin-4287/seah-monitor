ticker: "003030.KS"   # 세아제강지주 (지주사)

# forecast_eps는 더 이상 수동 입력하지 않습니다.
# 매일 업황 지표(pipe_ppi, rig_count, seah_usa, adnoc, midstream, us_proxy) 평균 점수로
# 사이클 단계를 자동 판단해 EPS를 결정합니다.
#
# 사이클 자동판단 기준:
#   avg ≥ 0.70 → 슈퍼사이클  EPS 70,000원  (2022~23년 수준)
#   avg ≥ 0.55 → 강세        EPS 55,000원
#   avg ≥ 0.40 → 기본회복    EPS 45,000원  (북미 OCTG+해외법인 개선)
#   avg ≥ 0.25 → 약한회복    EPS 35,000원
#   avg  < 0.25→ 저점        EPS 25,000원

weights:
  pipe_price_proxy: 15   # FRED WPU10170652 (탄소강 파이프 PPI, 월간)
  rig_count_proxy:  10   # Baker Hughes 뉴스 파싱
  henry_hub:        10   # FRED DHHNGSP (Henry Hub 천연가스, 일간)
  wti_price:        15   # FRED DCOILWTICO (WTI 유가, 일간)
  steel_ppi:        10   # FRED WPU1017 (철강 밀 제품 PPI, 월간)
  us_proxy_stocks:  10   # DNOW·TS·BKR·HAL·SLB·HP·PTEN (1W/1M)
  forward_eps:      15   # 사이클 자동판단 → EPS → Forward PER
  breakout_signal:  15   # yfinance 003030.KS (52주 고가권 + 거래량)

fred_series:
  carbon_pipe_ppi: "WPU10170652"
  steel_pipe_tube_ppi: "WPU101706"
  fabricated_pipe_fittings_ppi: "WPU107411"

news_queries:
  seah_usa_proxy:
    - '"SeAH Steel USA" "line pipe"'
    - '"SeAH Steel USA" OCTG capacity utilization'
    - '"SeAH Steel USA" Houston Texas'
    - 'SeAH Steel USA midstream pipeline contract'

  adnoc_middle_east:
    - 'ADNOC SeAH Steel Holdings API pipeline'
    - 'ADNOC XRG US gas pipeline'
    - 'ADNOC Hail Ghasha clad pipe award'
    - 'ADNOC oil gas project line pipe 2026'

  # 아프리카 프록시 → 미국 미드스트림/알래스카 LNG로 교체
  # (실제 세아제강 자본배분 본류는 ET 미드스트림 CAPEX + Alaska LNG 라인파이프)
  us_midstream_alaska:
    - '"Energy Transfer" "line pipe" pipeline 2026 CAPEX'
    - '"Hugh Brinson Pipeline" Texas steel'
    - '"Desert Southwest" pipeline steel procurement'
    - '"Alaska LNG" pipeline steel contract'
    - '"Alaska LNG" "line pipe" procurement 2026'
    - 'Glenfarne "line pipe" steel API 5L'
    - 'US midstream pipeline CAPEX "line pipe" award'

positive_keywords:
  - "contract"
  - "supply"
  - "FID"
  - "restart"
  - "award"
  - "expansion"
  - "procurement"
  - "capacity"
  - "line pipe"
  - "OCTG"
  - "clad pipe"
  - "pipeline"
  - "CAPEX"
  - "midstream"

negative_keywords:
  - "delay"
  - "cancel"
  - "postpone"
  - "force majeure"
  - "sanction"
  - "security risk"
  - "shutdown"
  - "tariff"
  - "import duty"

telegram:
  enabled: true
  bot_token_env: "TELEGRAM_BOT_TOKEN"
  chat_id_env: "TELEGRAM_CHAT_ID"
