  - "supply"
  - "FID"
  - "award"
  - "procurement"
  - "capacity"
  - "line pipe"
  - "OCTG"
  - "clad pipe"
  - "pipeline"
  - "CAPEX"
  - "midstream"
  - "expansion"
  # 해상풍력
  - "monopile"
  - "offshore wind"
  - "foundation"
  - "CfD"
  - "AR8"
  - "substructure"
  - "local content"
