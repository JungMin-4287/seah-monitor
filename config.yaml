ticker: "003030.KS"   # 세아제강지주(003030) — 지주사

# forecast_eps 수동 입력 불필요.
# 매일 업황 6개 신호 평균 → 사이클 단계 → 본업EPS 자동 결정
# + SeAH Wind 뉴스 점수 → ADD EPS 자동 산출
#
# 본업 EPS 자동판단:
#   avg ≥ 0.70 → 슈퍼사이클 EPS 90,000원  (22~23년 피크 수준)
#   avg ≥ 0.55 → 강세       EPS 65,000원
#   avg ≥ 0.40 → 기본회복   EPS 45,000원  (26E 기본 시나리오)
#   avg ≥ 0.25 → 약한회복   EPS 30,000원
#   avg  < 0.25→ 저점       EPS 15,000원  (25년 실적 수준)
#
# SeAH Wind ADD EPS (77%연결, 발행주수 4,141천주):
#   score ≥ 0.70 → ADD 16,000원  (풀캐파 ADD OP ~2,400억)
#   score ≥ 0.50 → ADD 10,000원  (ADD OP ~1,500억)
#   score ≥ 0.30 → ADD  5,000원  (26H2 부분인식 ~700억)
#   score  < 0.30→ ADD      0원  (아직 인식 전)

weights:
  pipe_ppi:        10   # FRED WPU10170652 (탄소강 파이프 PPI, 월간)
  rig_count:        5   # Baker Hughes 뉴스 — 후행지표, 의도적 최소화
  wti_price:       10   # FRED DCOILWTICO (WTI유가, 일간)
  export_comp:      9   # US Census HS7306 한국산 강관 對美수입 금액 MoM/YoY
  steel_ppi:        8   # FRED WPU1017 (美Steel PPI) — Census 2개월 지연 보완
  tenaris:         10   # Tenaris(TS NYSE) — OCTG 선행지표
  seah_wind:       12   # SeAH Wind 뉴스 모멘텀 ★ 핵심
  forward_eps:     13   # 사이클자동판단 + SeAHWind ADD → Forward PER
  breakout_signal: 11   # yfinance 003030.KS (52주고가권 + 거래량)
  us_proxy:        12   # DNOW·TS·BKR·HAL·SLB·HP·PTEN (1W/1M)
# 합계: 100  (10+5+10+9+8+10+12+13+11+12=100)

fred_series:
  carbon_pipe_ppi: "WPU10170652"

news_queries:
  seah_wind:
    # ── SeAH Wind 직접 뉴스
    - '"SeAH Wind" monopile offshore contract'
    - '"SeAH Wind" Teesside order award'
    - '"SeAH Wind" foundation supply capacity'

    # ── 영국 해상풍력 정책·CAPEX
    - 'UK offshore wind AR8 CfD auction 2026'
    - 'UK offshore wind "local content" CIB bonus award'
    - 'UK offshore wind CAPEX investment expansion'
    - 'UK offshore wind policy government 2026'
    - 'RWE "Nordseecluster" monopile substructure contract'
    - 'UK offshore wind monopile order foundation 2026'

    # ── 대만 해상풍력 (세아윈드 수출 후보 시장)
    - 'Taiwan offshore wind monopile substructure order'
    - 'Taiwan offshore wind CAPEX 2026 contract'
    - 'Taiwan offshore wind foundation supply'

    # ── 한국 해상풍력 (국내 시장)
    - '한국 해상풍력 모노파일 하부구조물 수주'
    - 'Korea offshore wind monopile substructure 2026'
    - '해상풍력 특별법 CfD 하부구조물'

    # ── 글로벌 해상풍력 CAPEX 방향성
    - 'offshore wind CAPEX investment record 2026'
    - 'offshore wind monopile demand supply 2026'

